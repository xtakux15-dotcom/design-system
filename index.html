<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components-top.jsx"></script>
  <script type="text/babel" src="components-mid.jsx"></script>
  <script type="text/babel" src="components-bottom.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "lime",
      "marqueeText": "FIRE SAFETY INSPECTION",
      "showStats": true
    }/*EDITMODE-END*/;

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      useEffect(() => {
        document.documentElement.dataset.theme = tweaks.theme;
      }, [tweaks.theme]);

      const marqueeItems = [
        tweaks.marqueeText || 'FIRE SAFETY INSPECTION',
        '消防設備点検',
        'OSAKA × TOKYO',
        '機器点検 × 総合点検',
        'SINCE 2011',
        '報告書提出代行',
      ];

      return (
        <>
          <Header />
          <Hero />
          <MarqueeDivider items={marqueeItems} />
          <Issues />
          <Reasons />
          <Services />
          <Pricing />
          <Flow />
          <Areas />
          {tweaks.showStats && <StatsBand />}
          <Voices />
          <FAQ />
          <Company />
          <Contact />
          <Footer />

          <TweaksPanel title="Tweaks">
            <TweakSection label="カラーテーマ">
              <TweakRadio
                label="THEME"
                value={tweaks.theme}
                options={[
                  { value: 'lime',   label: 'Lime' },
                  { value: 'orange', label: 'Orange' },
                  { value: 'formal', label: 'Formal' },
                ]}
                onChange={(v) => setTweak('theme', v)}
              />
            </TweakSection>
            <TweakSection label="マーキー">
              <TweakText
                label="MARQUEE TEXT"
                value={tweaks.marqueeText}
                onChange={(v) => setTweak('marqueeText', v)}
              />
            </TweakSection>
            <TweakSection label="セクション">
              <TweakToggle
                label="統計バンドを表示"
                value={tweaks.showStats}
                onChange={(v) => setTweak('showStats', v)}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
